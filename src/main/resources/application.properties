# =============================================================================
# Alertmanager MCP Server Configuration
# =============================================================================

# Server
quarkus.http.port=9082

# Alertmanager API - REST Client
quarkus.rest-client.alertmanager-api.url=${ALERTMANAGER_URL:http://localhost:9093}
quarkus.rest-client.alertmanager-api.scope=jakarta.inject.Singleton

# MCP Server
quarkus.mcp.server.traffic-logging.enabled=true

# Health
quarkus.smallrye-health.root-path=/q/health

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.monitoring".level=DEBUG
